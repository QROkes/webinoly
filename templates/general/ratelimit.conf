# Webinoly (This configuration file is only for internal use)
#####################################################################################################
# Please, DO NOT MODIFY this file, all the changes will be lost.                                    #
# If you need to modify any of the existing rules, use the proper command as indicated in the docs. #
# If you need to add your own custom rules, you can create a custom file as indicated in the docs.  #
# Please, read the documentation: https://webinoly.com/documentation/                               #
#####################################################################################################

# Step 1: Detect WP loggedin users
map $http_cookie $cookie_key {
	default $binary_remote_addr;
	~wordpress_logged_in_ "";
}

# Step 2: Whitelisted IP's
map $remote_addr $raw_limit_key {
	#1.1.1.1 ""; # Example
	default $cookie_key;
}

# Step 3: Exclude /pma only when on port 22222
map "$server_port:$request_uri" $limit_key {
	~^22222:/pma  "";
	default $raw_limit_key;
}

# Step 4: Apply rate limiting globally
limit_req_zone $limit_key zone=abuser_limit:10m rate=5r/m;
limit_req zone=abuser_limit burst=10 nodelay;

# Step 5: Limit concurrent connections per IP
limit_conn_zone $limit_key zone=conn_limit:10m;
limit_conn conn_limit 5;
